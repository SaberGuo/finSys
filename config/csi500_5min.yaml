dates:
  train_start: "2024-01-01"
  train_end: "2024-12-31"
  test_start: "2025-01-01"
  test_end: "2026-02-27"  # Updated to match database max date

data:
  source_priority: ["db_5min"]
  output_dir: "data/processed"

frequency: "5min"

indicator_sets:
  - id: "trend_momentum_5min"
    name: "Trend + Momentum"
    frequency: "5min"
    indicators:
      - "macd"
      - "rsi_30"
      - "close_30_sma"
    window_params:
      rsi_period: 1440
      sma_period: 1440

  - id: "volatility_reversal_5min"
    name: "Volatility + Reversal"
    frequency: "5min"
    indicators:
      - "boll_ub"
      - "boll_lb"
      - "dx_30"
      - "rsi_30"
    window_params:
      boll_period: 960
      dx_period: 1440
      rsi_period: 1440

  - id: "volume_price_5min"
    name: "Volume + Price"
    frequency: "5min"
    indicators:
      - "close_30_sma"
      - "close_60_sma"
      - "volume_ratio"
    window_params:
      sma_30: 1440
      sma_60: 2880

target:
  type: "future_return"
  horizon: 1
  threshold: 0.0

training:
  algorithm: "ppo"
  total_timesteps: 100000
  model_dir: "models"

environment:
  initial_amount: 1000000
  hmax: 100
  buy_cost_pct: 0.001
  sell_cost_pct: 0.001
  reward_scaling: 0.0001
